<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="markShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- macOS-style squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bgGlow)"/>

  <!-- Play / connect triangle with rounded corners via stroke-linejoin -->
  <g filter="url(#markShadow)">
    <polygon
      points="380,240 740,512 380,784"
      fill="#ffffff"
      stroke="#ffffff"
      stroke-width="72"
      stroke-linejoin="round"
      stroke-linecap="round"/>
  </g>

  <!-- Terminal cursor underscore to evoke shell -->
  <rect x="408" y="872" width="240" height="36" rx="12" fill="#ffffff" fill-opacity="0.92"/>
</svg>
