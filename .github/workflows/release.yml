name: Release (build installers)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create a draft GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write  # required to create / attach assets to a Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ensure_main:
    name: Ensure commit is on main
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit belongs to main
        id: check
        shell: bash
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "Commit is on main"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "Commit is not on main; skipping release jobs."
          fi

  build:
    name: Build ${{ matrix.target.name }}
    needs: ensure_main
    if: needs.ensure_main.outputs.on_main == 'true'
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 40
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: macOS (arm64 DMG)
            os: macos-14
            electron_args: --mac dmg --arm64
            artifact_name: vssh-arm64-dmg
            artifact_paths: |
              release/*.dmg
              release/*.blockmap
          - name: Linux (x64 AppImage)
            os: ubuntu-latest
            electron_args: --linux AppImage --x64
            artifact_name: vssh-linux-x64-appimage
            artifact_paths: |
              release/*.AppImage
              release/*.blockmap
          - name: Windows (x64 NSIS)
            os: windows-latest
            electron_args: --win nsis --x64
            artifact_name: vssh-windows-x64-nsis
            artifact_paths: |
              release/*.exe
              release/*.blockmap
              release/latest*.yml
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Electron and builder downloads
        uses: actions/cache@v4
        with:
          path: |
            .electron-cache
            .electron-builder-cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install librsvg (for icon build)
        if: runner.os == 'macOS'
        run: brew install librsvg

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            echo "npm ci attempt ${attempt}/5"
            if npm ci; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "npm ci failed after 5 attempts" >&2
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Build app icon
        if: runner.os == 'macOS'
        run: npm run build:icon

      - name: Build Touch ID keychain helper
        if: runner.os == 'macOS'
        run: npm run build:macos-keychain

      - name: Build (main + preload + renderer)
        run: npm run build

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      # Optional code signing: set the secrets below in your repo settings to
      # enable. Without them, electron-builder produces an unsigned DMG that
      # macOS will warn about on first launch (right-click → Open to bypass).
      #
      # NOTE: GitHub Actions substitutes empty strings for unset secrets.
      # electron-builder treats CSC_LINK="" as 'look for cert at CWD' and
      # fails with '/Users/runner/work/vssh/vssh not a file'. The shell
      # block below unsets any empty signing var so electron-builder
      # cleanly skips signing instead.
      - name: Package app
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            echo "Release binaries must be built from a v* tag (got: $GITHUB_REF)" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Could not parse version from tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "Packaging version $VERSION from tag $GITHUB_REF_NAME"
          if [ "$RUNNER_OS" = "macOS" ]; then
            for v in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
              if [ -z "${!v}" ]; then unset "$v"; fi
            done
            # Disable automatic identity discovery so electron-builder doesn't
            # try to sign with a keychain identity that doesn't exist on the runner.
            if [ -z "${CSC_LINK:-}" ]; then
              export CSC_IDENTITY_AUTO_DISCOVERY=false
            fi
          fi
          for attempt in 1 2 3 4 5; do
            echo "electron-builder attempt ${attempt}/5"
            if npx electron-builder ${{ matrix.target.electron_args }} --publish never --config.extraMetadata.version="$VERSION"; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "electron-builder failed after 5 attempts" >&2
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Inspect release output (Unix)
        if: runner.os != 'Windows'
        run: ls -lh release/

      - name: Inspect release output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem release | Format-Table Name,Length,LastWriteTime

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact_name }}
          path: ${{ matrix.target.artifact_paths }}
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Attach artifacts to GitHub Release
    needs: [ensure_main, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && needs.ensure_main.outputs.on_main == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release output
        run: ls -lh release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          append_body: true
          body: |
            ## Install

            - **macOS (Apple Silicon)**: download the `.dmg`, open it, then drag **vssh** to Applications.
            - **Linux (x64)**: download the `.AppImage`, then:
              ```bash
              chmod +x vssh-*.AppImage
              ./vssh-*.AppImage
              ```
            - **Windows (x64)**: download and run the `.exe` installer.

            ### macOS one-time setup

            If macOS shows *"vssh is damaged and can't be opened"* for an unsigned app:
            ```bash
            sudo xattr -cr /Applications/vssh.app
            ```

            ### Why this is needed on macOS

            Unsigned apps downloaded from the internet may be quarantined by Gatekeeper.
            Removing the quarantine marker allows the app to open.

            ### Legacy detailed steps

            1. Download the macOS `.dmg` below.
            2. Open the DMG and drag **vssh** to Applications.
            3. If prompted by Gatekeeper, run:
               ```bash
               sudo xattr -cr /Applications/vssh.app
               ```
            4. Open vssh.

            ---

            ### What's changed
