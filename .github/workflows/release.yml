name: Release (build DMG)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create a draft GitHub Release'
        type: boolean
        default: true

permissions:
  contents: write  # required to create / attach assets to a Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dmg:
    name: Build DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14   # Apple Silicon
          - arch: x64
            runner: macos-13   # Intel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install librsvg (for icon build)
        run: brew install librsvg

      - name: Install dependencies
        run: npm ci

      - name: Build app icon
        run: npm run build:icon

      - name: Build (main + preload + renderer)
        run: npm run build

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      # Optional code signing: set the secrets below in your repo settings to
      # enable. Without them, electron-builder produces an unsigned DMG that
      # macOS will warn about on first launch (right-click → Open to bypass).
      #
      # NOTE: GitHub Actions substitutes empty strings for unset secrets.
      # electron-builder treats CSC_LINK="" as 'look for cert at CWD' and
      # fails with '/Users/runner/work/vssh/vssh not a file'. The shell
      # block below unsets any empty signing var so electron-builder
      # cleanly skips signing instead.
      - name: Package DMG
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for v in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!v}" ]; then unset "$v"; fi
          done
          # Disable automatic identity discovery so electron-builder doesn't
          # try to sign with a keychain identity that doesn't exist on the runner.
          if [ -z "${CSC_LINK:-}" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --mac dmg --${{ matrix.arch }} --publish never

      - name: Inspect release output
        run: ls -lh release/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: vssh-${{ matrix.arch }}-dmg
          path: |
            release/*.dmg
            release/*.blockmap
          retention-days: 30
          if-no-files-found: error

  publish:
    name: Attach DMGs to GitHub Release
    needs: dmg
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -name '*.dmg'      -exec cp {} release/ \;
          find artifacts -name '*.blockmap' -exec cp {} release/ \;
          ls -lh release/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
