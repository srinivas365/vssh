name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck + unit tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            .electron-cache
            .electron-builder-cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install build tools for native modules
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            echo "npm ci attempt ${attempt}/5"
            if npm ci; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "npm ci failed after 5 attempts" >&2
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Typecheck (main + preload + renderer)
        run: npm run typecheck

      - name: Build (catches bundler errors)
        run: npm run build

      - name: Unit tests
        run: npm test

  e2e:
    name: End-to-end (Electron + sshd)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.electron-cache
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            .electron-cache
            .electron-builder-cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 xvfb

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            echo "npm ci attempt ${attempt}/5"
            if npm ci; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "npm ci failed after 5 attempts" >&2
              exit 1
            fi
            sleep $((attempt * 20))
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Rebuild native modules for Electron
        run: npm run rebuild:electron

      - name: Start sshd test container
        run: docker compose -f test/e2e/docker-compose.sshd.yml up -d

      - name: Wait for sshd
        run: |
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 2222 2>/dev/null; then
              echo "sshd ready"; exit 0
            fi
            sleep 1
          done
          echo "sshd timeout"; exit 1

      - name: Run Playwright (Electron via xvfb)
        run: xvfb-run --auto-servernum --server-args='-screen 0 1280x800x24' npx playwright test

      - name: Stop sshd container
        if: always()
        run: docker compose -f test/e2e/docker-compose.sshd.yml down

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
